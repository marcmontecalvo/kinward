[tools]
python = "3.14.4"
uv = "0.11.28"
node = { version = "24.18.0", postinstall = "corepack enable" }

[env]
_.python.venv = { path = "services/kinward/.venv", create = true }

[tasks.install]
description = "Install Python and JavaScript dependencies"
run = [
  "uv sync --project services/kinward --all-groups --frozen",
  "corepack pnpm install --frozen-lockfile",
]

[tasks.lock]
description = "Refresh dependency lockfiles"
run = [
  "uv lock --project services/kinward",
  "corepack pnpm install --lockfile-only",
]

[tasks.api]
description = "Run the Kinward API"
run = "uv run --project services/kinward uvicorn kinward.app:app --reload --host 0.0.0.0 --port 8000"

[tasks.worker]
description = "Run the Kinward durable worker readiness process"
run = "uv run --project services/kinward python -m kinward.worker"

[tasks.web]
description = "Run the Kinward web client"
run = "corepack pnpm --filter @kinward/web dev"

[tasks.migrate]
description = "Apply database migrations"
run = "uv run --project services/kinward alembic -c services/kinward/alembic.ini upgrade head"

[tasks.test]
description = "Run all tests"
run = [
  "uv run --project services/kinward pytest services/kinward/tests",
  "corepack pnpm -r test",
]

[tasks.browser-test]
description = "Run the Chromium five-surface and accessibility evidence suite"
run = "corepack pnpm --filter @kinward/web test:e2e"

[tasks.lint]
description = "Run all linters"
run = [
  "uv run --project services/kinward ruff check services/kinward",
  "corepack pnpm -r lint",
]

[tasks.typecheck]
description = "Run all type checks"
run = [
  "cd services/kinward && uv run mypy src",
  "corepack pnpm -r typecheck",
]

[tasks.build]
description = "Build all applications and packages"
run = "corepack pnpm -r build"

[tasks.check]
description = "Run the complete validation suite"
depends = ["lint", "typecheck", "test", "build"]
