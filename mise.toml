[tools]
python = "3.14.4"
uv = "0.11.28"

[env]
_.python.venv = { path = "services/kinward/.venv", create = true }

[tasks.install]
description = "Install Python dependencies"
run = "uv sync --project services/kinward --all-groups --frozen"

[tasks.lock]
description = "Refresh dependency lockfiles"
run = "uv lock --project services/kinward"

[tasks.api]
description = "Run the Kinward API"
run = "uv run --project services/kinward uvicorn kinward.app:app --reload --host 0.0.0.0 --port 8000"

[tasks.worker]
description = "Run the Kinward durable worker readiness process"
run = "uv run --project services/kinward python -m kinward.worker"

[tasks.migrate]
description = "Apply database migrations"
run = "uv run --project services/kinward alembic -c services/kinward/alembic.ini upgrade head"

[tasks.test]
description = "Run all tests"
run = "uv run --project services/kinward pytest services/kinward/tests"

[tasks.lint]
description = "Run all linters"
run = "uv run --project services/kinward ruff check services/kinward"

[tasks.typecheck]
description = "Run all type checks"
run = "cd services/kinward && uv run mypy src"

[tasks.lint-ha]
description = "Lint the custom_components/kinward Home Assistant integration"
run = "uv run --project custom_components/kinward ruff check custom_components/kinward"

[tasks.test-ha]
description = "Run the custom_components/kinward pure-logic unit tests"
run = "uv run --project custom_components/kinward pytest custom_components/kinward/tests"

[tasks.build]
description = "Build all applications and packages"
run = "echo 'No build step: services/kinward runs from source; see custom_components/kinward for the HA integration.'"

[tasks.check]
description = "Run the complete validation suite"
depends = ["lint", "typecheck", "test", "lint-ha", "test-ha", "build"]
