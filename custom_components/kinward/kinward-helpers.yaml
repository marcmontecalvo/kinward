# Kinward dashboard helpers - backs the "Control" tab in kinward-dashboard.yaml.
#
# Home Assistant's stock Lovelace cards can't call a service with free-text
# input from a single tap - a button's service data is fixed at dashboard-edit
# time. These input_text/input_select helpers hold the value you type, and
# each script reads them and calls the matching kinward.* service, so the
# dashboard buttons work with zero trips to Developer Tools -> Actions.
#
# Install as a Home Assistant package: copy this file to your HA config
# directory (next to configuration.yaml) and add, if not already present:
#
#   homeassistant:
#     packages:
#       kinward: !include kinward-helpers.yaml
#
# Then restart Home Assistant (packages are loaded at startup, not on reload).
#
# Not covered here: kinward.import_assistant_persona and
# kinward.confirm_assistant_persona_import take a full document of free text
# plus a structured dimensions object - not a good fit for input_text helpers.
# Use Developer Tools -> Actions for those two.

input_text:
  kinward_assistant_name:
    name: "Kinward: assistant name"
    icon: mdi:account-star
    max: 120
  kinward_allowed_people:
    name: "Kinward: allowed people (comma-separated)"
    icon: mdi:account-multiple
    max: 255
  kinward_approval_id:
    name: "Kinward: approval ID"
    icon: mdi:key-variant
    max: 64
  kinward_attention_item_id:
    name: "Kinward: attention item ID"
    icon: mdi:key-variant
    max: 64
  kinward_request_assistant_name:
    name: "Kinward: requesting assistant"
    icon: mdi:account-star
    max: 120
  kinward_request_domain:
    name: "Kinward: HA domain"
    icon: mdi:shape
    max: 64
  kinward_request_service:
    name: "Kinward: HA service"
    icon: mdi:cog
    max: 64
  kinward_request_entity_id:
    name: "Kinward: target entity ID"
    icon: mdi:target
    max: 255
  kinward_request_explanation:
    name: "Kinward: explanation"
    icon: mdi:message-text
    max: 255

input_select:
  kinward_assistant_access_mode:
    name: "Kinward: assistant access mode"
    icon: mdi:shield-account
    options:
      - owner_only
      - household
      - allowlist
    initial: owner_only

script:
  kinward_create_assistant:
    alias: "Kinward: Create assistant"
    icon: mdi:account-plus
    sequence:
      - action: kinward.create_assistant
        data:
          name: "{{ states('input_text.kinward_assistant_name') }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.kinward_assistant_name
        data:
          value: ""

  kinward_delete_assistant:
    alias: "Kinward: Delete assistant"
    icon: mdi:account-remove
    sequence:
      - action: kinward.delete_assistant
        data:
          name: "{{ states('input_text.kinward_assistant_name') }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.kinward_assistant_name
        data:
          value: ""

  kinward_restart_assistant_interview:
    alias: "Kinward: Restart assistant interview"
    icon: mdi:refresh-circle
    sequence:
      - action: kinward.restart_assistant_interview
        data:
          name: "{{ states('input_text.kinward_assistant_name') }}"

  kinward_set_assistant_access:
    alias: "Kinward: Set assistant access"
    icon: mdi:shield-account
    sequence:
      - action: kinward.set_assistant_access
        data:
          name: "{{ states('input_text.kinward_assistant_name') }}"
          mode: "{{ states('input_select.kinward_assistant_access_mode') }}"
          allowed_names: >-
            {{ states('input_text.kinward_allowed_people')
               .split(',') | map('trim') | reject('equalto', '') | list }}

  kinward_approve_action:
    alias: "Kinward: Approve pending action"
    icon: mdi:check-circle
    sequence:
      - action: kinward.approve_action
        data:
          approval_id: "{{ states('input_text.kinward_approval_id') }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.kinward_approval_id
        data:
          value: ""

  kinward_deny_action:
    alias: "Kinward: Deny pending action"
    icon: mdi:close-circle
    sequence:
      - action: kinward.deny_action
        data:
          approval_id: "{{ states('input_text.kinward_approval_id') }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.kinward_approval_id
        data:
          value: ""

  kinward_cancel_action:
    alias: "Kinward: Cancel my pending action"
    icon: mdi:cancel
    sequence:
      - action: kinward.cancel_action
        data:
          approval_id: "{{ states('input_text.kinward_approval_id') }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.kinward_approval_id
        data:
          value: ""

  kinward_acknowledge_attention_item:
    alias: "Kinward: Acknowledge attention item"
    icon: mdi:eye-check
    sequence:
      - action: kinward.acknowledge_attention_item
        data:
          item_id: "{{ states('input_text.kinward_attention_item_id') }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.kinward_attention_item_id
        data:
          value: ""

  kinward_dismiss_attention_item:
    alias: "Kinward: Dismiss attention item"
    icon: mdi:eye-off
    sequence:
      - action: kinward.dismiss_attention_item
        data:
          item_id: "{{ states('input_text.kinward_attention_item_id') }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.kinward_attention_item_id
        data:
          value: ""

  kinward_request_action:
    alias: "Kinward: Request Home Assistant action"
    icon: mdi:send
    sequence:
      - action: kinward.request_action
        data:
          assistant_name: "{{ states('input_text.kinward_request_assistant_name') }}"
          domain: "{{ states('input_text.kinward_request_domain') }}"
          service: "{{ states('input_text.kinward_request_service') }}"
          entity_id: "{{ states('input_text.kinward_request_entity_id') }}"
          explanation: "{{ states('input_text.kinward_request_explanation') }}"
