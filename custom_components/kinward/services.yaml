refresh:
  name: Refresh
  description: >-
    Re-poll the Kinward backend now instead of waiting for the next scheduled
    update. There is no backend "generate a briefing" capability yet (Epic 5),
    so this simply forces a fresh read of the current household-safe summary.
  fields: {}

create_assistant:
  name: Create assistant
  description: >-
    Create another personal assistant for yourself (the household member
    calling this action), with its own name and personality - subject to this
    household's assistant policy (see the integration's Configure options:
    an optional max-per-person cap, and an optional admin-approval gate).
  fields:
    name:
      name: Name
      description: The new assistant's name.
      required: true
      example: "Business Assistant"
      selector:
        text:
    personality:
      name: Personality
      description: Optional personality/interaction preferences.
      required: false
      selector:
        object:

delete_assistant:
  name: Delete assistant
  description: >-
    Delete one of your own assistants by name. Never deletes another
    person's assistant, and never your last remaining one.
  fields:
    name:
      name: Name
      description: The assistant's name, exactly as shown.
      required: true
      example: "Business Assistant"
      selector:
        text:

set_assistant_access:
  name: Set assistant access
  description: >-
    Set who besides you may address one of your own assistants. Never
    affects which conversational memory is used, and grants no tool
    permission - a separate, still-unbuilt concern.
  fields:
    name:
      name: Name
      description: The assistant's name, exactly as shown.
      required: true
      example: "Bob"
      selector:
        text:
    mode:
      name: Mode
      description: >-
        owner_only: only you. household: any household member. allowlist:
        you plus the people named in "Allowed people".
      required: true
      selector:
        select:
          options:
            - owner_only
            - household
            - allowlist
    allowed_names:
      name: Allowed people
      description: Display names of household members to allow (allowlist mode only).
      required: false
      example: ["Lisa"]
      selector:
        object:

request_action:
  name: Request action
  description: >-
    Ask Kinward to submit a Home Assistant service call on behalf of one of
    your own assistants, subject to this household's tool-capability policy
    (allow / approval_required / deny per capability). A denied or
    approval-required result never executes silently - check
    sensor.kinward_pending_approvals after calling this.
  fields:
    assistant_name:
      name: Assistant
      description: The name of one of your own assistants to act through.
      required: true
      example: "Bob"
      selector:
        text:
    domain:
      name: Domain
      description: The Home Assistant domain of the target entity, e.g. "light".
      required: true
      example: "light"
      selector:
        text:
    service:
      name: Service
      description: The Home Assistant service to call, e.g. "turn_off".
      required: true
      example: "turn_off"
      selector:
        text:
    entity_id:
      name: Entity
      description: The target entity id. Must belong to the given domain.
      required: true
      example: "light.office"
      selector:
        text:
    explanation:
      name: Explanation
      description: A short, human-readable reason for the request.
      required: true
      example: "Turning off the office light for the night."
      selector:
        text:
    data:
      name: Extra data
      description: Optional additional service-call data beyond entity_id.
      required: false
      selector:
        object:

approve_action:
  name: Approve action
  description: >-
    Approve a pending action by id, as shown on
    sensor.kinward_pending_approvals. Any current household administrator may
    approve it.
  fields:
    approval_id:
      name: Approval ID
      description: The pending action's id, from sensor.kinward_pending_approvals.
      required: true
      selector:
        text:

deny_action:
  name: Deny action
  description: >-
    Deny a pending action by id, as shown on sensor.kinward_pending_approvals.
  fields:
    approval_id:
      name: Approval ID
      description: The pending action's id, from sensor.kinward_pending_approvals.
      required: true
      selector:
        text:

cancel_action:
  name: Cancel action
  description: >-
    Withdraw a pending action you requested, before anyone approves or denies
    it, as shown on sensor.kinward_pending_approvals. Only the person who
    requested it may cancel it - this is not an administrator power like
    approve_action/deny_action.
  fields:
    approval_id:
      name: Approval ID
      description: The pending action's id, from sensor.kinward_pending_approvals.
      required: true
      selector:
        text:

generate_briefing:
  name: Generate briefing
  description: >-
    Force a fresh read of the Kinward briefing now instead of waiting for the
    next scheduled update. The briefing is continuously current, not built on
    demand - this simply requests that read sooner.
  fields: {}

acknowledge_attention_item:
  name: Acknowledge attention item
  description: >-
    Acknowledge a calendar attention item by id, as shown on
    sensor.kinward_attention's items attribute. It stays visible but
    de-emphasized until it resolves, is dismissed, or a materially new change
    reactivates it.
  fields:
    item_id:
      name: Item ID
      description: The attention item's id, from sensor.kinward_attention.
      required: true
      selector:
        text:

dismiss_attention_item:
  name: Dismiss attention item
  description: >-
    Dismiss a calendar attention item by id. It stays hidden unless the
    underlying event changes materially again.
  fields:
    item_id:
      name: Item ID
      description: The attention item's id, from sensor.kinward_attention.
      required: true
      selector:
        text:

restart_assistant_interview:
  name: Restart assistant interview
  description: >-
    Redo one of your own assistants' personality interview (Story 3.5) -
    clears its interview answers and starts fresh on its next conversation
    turn. Never touches another person's assistant.
  fields:
    name:
      name: Name
      description: The assistant's name, exactly as shown.
      required: true
      example: "Jarvis"
      selector:
        text:

import_assistant_persona:
  name: Import assistant persona
  description: >-
    Extract a proposal (interaction-dimension values plus free-text grounding
    notes) from an existing persona document - a soul.md, an AGENTS.md-style
    character file, or a similar system-prompt/character description from
    another AI project. Never applies anything automatically: review the
    returned proposal, then call kinward.confirm_assistant_persona_import
    with the (optionally edited) values to actually save them.
  fields:
    name:
      name: Name
      description: The assistant's name, exactly as shown.
      required: true
      example: "Jarvis"
      selector:
        text:
    document_text:
      name: Document text
      description: The persona document's full text.
      required: true
      selector:
        text:
          multiline: true

confirm_assistant_persona_import:
  name: Confirm assistant persona import
  description: >-
    Commit a proposal from kinward.import_assistant_persona (or your own
    hand-edited version of it) to one of your own assistants. This is the
    only path an imported document can reach the assistant's personality
    through - nothing is ever saved automatically.
  fields:
    name:
      name: Name
      description: The assistant's name, exactly as shown.
      required: true
      example: "Jarvis"
      selector:
        text:
    dimensions:
      name: Dimensions
      description: >-
        A map of interaction-dimension name to short value, e.g.
        {"communication_style": "Direct and warm"}.
      required: false
      selector:
        object:
    grounding_notes:
      name: Grounding notes
      description: Free-text backstory/voice notes to keep alongside the dimensions.
      required: false
      selector:
        text:
          multiline: true
