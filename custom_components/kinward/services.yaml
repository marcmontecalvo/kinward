refresh:
  name: Refresh
  description: >-
    Re-poll the Kinward backend now instead of waiting for the next scheduled
    update. There is no backend "generate a briefing" capability yet (Epic 5),
    so this simply forces a fresh read of the current household-safe summary.
  fields: {}

create_assistant:
  name: Create assistant
  description: >-
    Create another personal assistant for yourself (the household member
    calling this action), with its own name and personality - subject to this
    household's assistant policy (see the integration's Configure options:
    an optional max-per-person cap, and an optional admin-approval gate).
  fields:
    name:
      name: Name
      description: The new assistant's name.
      required: true
      example: "Business Assistant"
      selector:
        text:
    personality:
      name: Personality
      description: Optional personality/interaction preferences.
      required: false
      selector:
        object:

delete_assistant:
  name: Delete assistant
  description: >-
    Delete one of your own assistants by name. Never deletes another
    person's assistant, and never your last remaining one.
  fields:
    name:
      name: Name
      description: The assistant's name, exactly as shown.
      required: true
      example: "Business Assistant"
      selector:
        text:

set_assistant_access:
  name: Set assistant access
  description: >-
    Set who besides you may address one of your own assistants. Never
    affects which conversational memory is used, and grants no tool
    permission - a separate, still-unbuilt concern.
  fields:
    name:
      name: Name
      description: The assistant's name, exactly as shown.
      required: true
      example: "Bob"
      selector:
        text:
    mode:
      name: Mode
      description: >-
        owner_only: only you. household: any household member. allowlist:
        you plus the people named in "Allowed people".
      required: true
      selector:
        select:
          options:
            - owner_only
            - household
            - allowlist
    allowed_names:
      name: Allowed people
      description: Display names of household members to allow (allowlist mode only).
      required: false
      example: ["Lisa"]
      selector:
        object:
