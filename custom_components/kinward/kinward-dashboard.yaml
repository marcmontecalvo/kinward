# Kinward household dashboard
#
# Import: Settings -> Dashboards -> Add dashboard -> New dashboard from scratch,
# then use the top-right three-dot menu -> "Edit dashboard" -> three-dot menu ->
# "Raw configuration editor", and paste this file's contents over the default.
#
# Every `person.replace_with_*` and `calendar.replace_with_*` entity below is a
# placeholder. Replace them with this household's real entity IDs before daily
# use - do not commit real household member names or entity IDs anywhere in
# source control (see AGENTS.md's public-repository safety rules).
#
# Built entirely from Home Assistant core cards; no Kinward-owned frontend code
# is required to use it (epics.md Story 1.6).
#
# The "Control" tab below calls kinward.* services through the input_text/
# input_select/script helpers in kinward-helpers.yaml - install that as a
# package (see its own header) before importing this file, or every button on
# that tab will show "entity not found". Kept as a separate tab, not mixed
# into "Home", because the product's UX spec requires Kinward Control to stay
# separate from everyday assistant navigation and keep raw technical fields
# (approval/item IDs, HA domain/service/entity_id) off the everyday surface.

title: Kinward
views:
  - title: Home
    path: home
    icon: mdi:home-heart
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Household
          - type: tile
            entity: person.replace_with_household_member_one
          - type: tile
            entity: person.replace_with_household_member_two

      - type: grid
        cards:
          - type: heading
            heading: Kinward
          - type: tile
            entity: binary_sensor.kinward_backend
            name: Backend
          - type: tile
            entity: sensor.kinward_household_status
            name: Household status
          - type: markdown
            title: Briefing
            content: >-
              {{ states('sensor.kinward_briefing')
                 if states('sensor.kinward_briefing') not in ['unknown', 'unavailable']
                 else 'No briefing yet.' }}

      - type: grid
        cards:
          - type: heading
            heading: Attention
          # Epic 5 Story 5.5's Briefings Card: refreshes automatically whenever
          # sensor.kinward_attention updates (no separate polling loop of its own),
          # shows the highest-priority items first (already ordered that way by the
          # backend), distinguishes active/acknowledged/recently-resolved items, and
          # has an explicit empty state - all from one core markdown card.
          - type: markdown
            content: |-
              {% set items = state_attr('sensor.kinward_attention', 'items') %}
              {% if states('sensor.kinward_attention') in ['unknown', 'unavailable'] %}
              Attention status is currently unavailable.
              {% elif not items %}
              Nothing needs your attention right now.
              {% else %}
              {% for item in items %}
              {% if item.state == 'resolved' %}
              ✅ ~~{{ item.summary }}~~ (resolved)
              {% elif item.state == 'acknowledged' %}
              👁️ {{ item.summary }} (acknowledged)
              {% else %}
              ⚠️ **{{ item.summary }}**
              {% endif %}
              {% endfor %}
              {% endif %}
          - type: tile
            entity: conversation.kinward
            name: Talk to Kinward
            tap_action:
              action: assist

      - type: grid
        cards:
          - type: heading
            heading: Today
          - type: calendar
            entities:
              - calendar.replace_with_household_calendar

      - type: grid
        cards:
          - type: heading
            heading: Assistants
          # Epic 3 Story 3.7's catalog, rendered with a core card so no opt-in
          # frontend resource is required by default - visualStage/visualStageIcon
          # are public identity fields only (never `personality`, which never enters
          # HA entity state at all). Swap this markdown card for
          # `type: custom:kinward-assistant-card` (with `assistant_id` or
          # `assistant_name` set) if you want the richer, generic pack-driven visual
          # instead - it auto-registers with no separate "add resource" step
          # (Epic 10 Story 10.5).
          - type: markdown
            title: Assistants
            content: |-
              {% set assistants = state_attr('sensor.kinward_assistants', 'assistants') %}
              {% if assistants %}
              | Name | Pack | Stage |
              | --- | --- | --- |
              {% for assistant in assistants -%}
              | {{ assistant.name }} | {{ assistant.visual_pack_id }} | {{ assistant.visual_stage }} |
              {% endfor %}
              {% else %}
              No assistants yet.
              {% endif %}
          # - type: custom:kinward-assistant-card
          #   assistant_name: "Replace with your assistant's name"

      - type: grid
        cards:
          - type: heading
            heading: Household roster
          - type: markdown
            title: People
            content: |-
              {% set people = state_attr('sensor.kinward_people', 'people') %}
              {% if people %}
              | Name | Role | HA login |
              | --- | --- | --- |
              {% for person in people -%}
              | {{ person.display_name }} | {{ person.role }} | {{ 'yes' if person.ha_user_id else 'no' }} |
              {% endfor %}
              {% else %}
              No people synced yet.
              {% endif %}
          - type: markdown
            title: Pets
            content: |-
              {% set pets = state_attr('sensor.kinward_pets', 'pets') %}
              {% if pets %}
              | Name | Species |
              | --- | --- |
              {% for pet in pets -%}
              | {{ pet.display_name }} | {{ pet.species }} |
              {% endfor %}
              {% else %}
              No pets on record yet.
              {% endif %}

  - title: Control
    path: control
    icon: mdi:shield-account
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Quick actions
          - type: button
            name: Refresh
            icon: mdi:refresh
            tap_action:
              action: perform-action
              perform_action: kinward.refresh
          - type: button
            name: Generate briefing
            icon: mdi:newspaper-variant
            tap_action:
              action: perform-action
              perform_action: kinward.generate_briefing

      - type: grid
        cards:
          - type: heading
            heading: Manage assistants
          - type: markdown
            content: >-
              The personality interview isn't set from here - after creating an
              assistant, talk to it (Assist) and it'll ask its interview questions
              on the next few turns.
          - type: entities
            entities:
              - entity: input_text.kinward_assistant_name
                name: Assistant name
          - type: horizontal-stack
            cards:
              - type: button
                name: Create
                icon: mdi:account-plus
                tap_action:
                  action: perform-action
                  perform_action: script.kinward_create_assistant
              - type: button
                name: Restart interview
                icon: mdi:refresh-circle
                tap_action:
                  action: perform-action
                  perform_action: script.kinward_restart_assistant_interview
              - type: button
                name: Delete
                icon: mdi:account-remove
                tap_action:
                  action: perform-action
                  perform_action: script.kinward_delete_assistant
                  confirmation:
                    text: Delete this assistant? This cannot be undone.

      - type: grid
        cards:
          - type: heading
            heading: Assistant access
          - type: entities
            entities:
              - entity: input_select.kinward_assistant_access_mode
                name: Mode
              - entity: input_text.kinward_allowed_people
                name: Allowed people (allowlist mode only)
          - type: button
            name: Set access
            icon: mdi:shield-account
            tap_action:
              action: perform-action
              perform_action: script.kinward_set_assistant_access

      - type: grid
        cards:
          - type: heading
            heading: Pending approvals
          - type: markdown
            content: |-
              {% set actions = state_attr('sensor.kinward_pending_approvals', 'pending_actions') %}
              {% if actions %}
              | ID | Action | Explanation | Expires |
              | --- | --- | --- | --- |
              {% for item in actions -%}
              | `{{ item.id }}` | {{ item.action }} | {{ item.explanation }} | {{ item.expires_at }} |
              {% endfor %}
              {% else %}
              Nothing pending approval right now.
              {% endif %}
          - type: entities
            entities:
              - entity: input_text.kinward_approval_id
                name: Approval ID
          - type: horizontal-stack
            cards:
              - type: button
                name: Approve
                icon: mdi:check-circle
                tap_action:
                  action: perform-action
                  perform_action: script.kinward_approve_action
              - type: button
                name: Deny
                icon: mdi:close-circle
                tap_action:
                  action: perform-action
                  perform_action: script.kinward_deny_action
              - type: button
                name: Cancel mine
                icon: mdi:cancel
                tap_action:
                  action: perform-action
                  perform_action: script.kinward_cancel_action

      - type: grid
        cards:
          - type: heading
            heading: Attention items
          - type: markdown
            content: |-
              {% set items = state_attr('sensor.kinward_attention', 'items') %}
              {% if items %}
              | ID | Summary | State |
              | --- | --- | --- |
              {% for item in items -%}
              | `{{ item.id }}` | {{ item.summary }} | {{ item.state }} |
              {% endfor %}
              {% else %}
              Nothing needs attention right now.
              {% endif %}
          - type: entities
            entities:
              - entity: input_text.kinward_attention_item_id
                name: Item ID
          - type: horizontal-stack
            cards:
              - type: button
                name: Acknowledge
                icon: mdi:eye-check
                tap_action:
                  action: perform-action
                  perform_action: script.kinward_acknowledge_attention_item
              - type: button
                name: Dismiss
                icon: mdi:eye-off
                tap_action:
                  action: perform-action
                  perform_action: script.kinward_dismiss_attention_item

      - type: grid
        cards:
          - type: heading
            heading: Request a Home Assistant action
          - type: markdown
            content: >-
              Ask one of your assistants to submit a Home Assistant service call
              on your behalf, subject to this household's tool-capability policy
              (see the integration's Options). A denied or approval-required
              result never executes silently - check Pending approvals above.
          - type: entities
            entities:
              - entity: input_text.kinward_request_assistant_name
                name: Assistant
              - entity: input_text.kinward_request_domain
                name: Domain (e.g. light)
              - entity: input_text.kinward_request_service
                name: Service (e.g. turn_off)
              - entity: input_text.kinward_request_entity_id
                name: Entity ID
              - entity: input_text.kinward_request_explanation
                name: Explanation
          - type: button
            name: Submit request
            icon: mdi:send
            tap_action:
              action: perform-action
              perform_action: script.kinward_request_action

      - type: grid
        cards:
          - type: heading
            heading: Advanced
          - type: markdown
            content: >-
              `kinward.import_assistant_persona` and
              `kinward.confirm_assistant_persona_import` take a full document of
              free text plus a structured dimensions object - not a good fit for
              a dashboard button. Use Developer Tools -> Actions for those two.
