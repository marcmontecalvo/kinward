# Kinward household dashboard
#
# Import: Settings -> Dashboards -> Add dashboard -> New dashboard from scratch,
# then use the top-right three-dot menu -> "Edit dashboard" -> three-dot menu ->
# "Raw configuration editor", and paste this file's contents over the default.
#
# Every `person.replace_with_*` and `calendar.replace_with_*` entity below is a
# placeholder. Replace them with this household's real entity IDs before daily
# use - do not commit real household member names or entity IDs anywhere in
# source control (see AGENTS.md's public-repository safety rules).
#
# Built entirely from Home Assistant core cards; no Kinward-owned frontend code
# is required to use it (epics.md Story 1.6).

title: Kinward
views:
  - title: Home
    path: home
    icon: mdi:home-heart
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Household
          - type: tile
            entity: person.replace_with_household_member_one
          - type: tile
            entity: person.replace_with_household_member_two

      - type: grid
        cards:
          - type: heading
            heading: Kinward
          - type: tile
            entity: binary_sensor.kinward_backend
            name: Backend
          - type: tile
            entity: sensor.kinward_household_status
            name: Household status
          - type: markdown
            title: Briefing
            content: >-
              {{ states('sensor.kinward_briefing')
                 if states('sensor.kinward_briefing') not in ['unknown', 'unavailable']
                 else 'No briefing yet.' }}

      - type: grid
        cards:
          - type: heading
            heading: Attention
          # Epic 5 Story 5.5's Briefings Card: refreshes automatically whenever
          # sensor.kinward_attention updates (no separate polling loop of its own),
          # shows the highest-priority items first (already ordered that way by the
          # backend), distinguishes active/acknowledged/recently-resolved items, and
          # has an explicit empty state - all from one core markdown card.
          - type: markdown
            content: |-
              {% set items = state_attr('sensor.kinward_attention', 'items') %}
              {% if states('sensor.kinward_attention') in ['unknown', 'unavailable'] %}
              Attention status is currently unavailable.
              {% elif not items %}
              Nothing needs your attention right now.
              {% else %}
              {% for item in items %}
              {% if item.state == 'resolved' %}
              ✅ ~~{{ item.summary }}~~ (resolved)
              {% elif item.state == 'acknowledged' %}
              👁️ {{ item.summary }} (acknowledged)
              {% else %}
              ⚠️ **{{ item.summary }}**
              {% endif %}
              {% endfor %}
              {% endif %}
          - type: tile
            entity: conversation.kinward
            name: Talk to Kinward
            tap_action:
              action: assist

      - type: grid
        cards:
          - type: heading
            heading: Today
          - type: calendar
            entities:
              - calendar.replace_with_household_calendar

      - type: grid
        cards:
          - type: heading
            heading: Assistants
          # Epic 3 Story 3.7's catalog, rendered with a core card so no opt-in
          # frontend resource is required by default - visualStage/visualStageIcon
          # are public identity fields only (never `personality`, which never enters
          # HA entity state at all). Swap this markdown card for
          # `type: custom:kinward-assistant-card` (with `assistant_id` or
          # `assistant_name` set) if you want the richer, generic pack-driven visual
          # instead - it auto-registers with no separate "add resource" step
          # (Epic 10 Story 10.5).
          - type: markdown
            title: Assistants
            content: |-
              {% set assistants = state_attr('sensor.kinward_assistants', 'assistants') %}
              {% if assistants %}
              | Name | Pack | Stage |
              | --- | --- | --- |
              {% for assistant in assistants -%}
              | {{ assistant.name }} | {{ assistant.visual_pack_id }} | {{ assistant.visual_stage }} |
              {% endfor %}
              {% else %}
              No assistants yet.
              {% endif %}
          # - type: custom:kinward-assistant-card
          #   assistant_name: "Replace with your assistant's name"

      - type: grid
        cards:
          - type: heading
            heading: Household roster
          - type: markdown
            title: People
            content: |-
              {% set people = state_attr('sensor.kinward_people', 'people') %}
              {% if people %}
              | Name | Role | HA login |
              | --- | --- | --- |
              {% for person in people -%}
              | {{ person.display_name }} | {{ person.role }} | {{ 'yes' if person.ha_user_id else 'no' }} |
              {% endfor %}
              {% else %}
              No people synced yet.
              {% endif %}
          - type: markdown
            title: Pets
            content: |-
              {% set pets = state_attr('sensor.kinward_pets', 'pets') %}
              {% if pets %}
              | Name | Species |
              | --- | --- |
              {% for pet in pets -%}
              | {{ pet.display_name }} | {{ pet.species }} |
              {% endfor %}
              {% else %}
              No pets on record yet.
              {% endif %}
