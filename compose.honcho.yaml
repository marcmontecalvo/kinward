# Optional Honcho (conversational memory) peer.
#
# Absent from the default `docker compose up` inventory. Enabled explicitly with
# `--profile honcho`, normally via `scripts/kinward-setup.sh` rather than by hand.
# Honcho is vendored as a git checkout at ./vendor/honcho (see scripts/kinward-setup.sh)
# and built from source, matching how plastic-labs/honcho ships (no published image).
x-honcho-env: &honcho-env
  DB_CONNECTION_URI: postgresql+psycopg://honcho:${KINWARD_HONCHO_POSTGRES_PASSWORD:?Run scripts/kinward-setup.sh to generate this}@honcho-db:5432/honcho
  CACHE_URL: redis://honcho-redis:6379/0?suppress=true
  CACHE_ENABLED: "true"
  AUTH_USE_AUTH: "false"
  LLM_OPENAI_API_KEY: ${KINWARD_HONCHO_LLM_OPENAI_API_KEY:-}
  LLM_ANTHROPIC_API_KEY: ${KINWARD_HONCHO_LLM_ANTHROPIC_API_KEY:-}
  LLM_GEMINI_API_KEY: ${KINWARD_HONCHO_LLM_GEMINI_API_KEY:-}

services:
  honcho-db:
    image: pgvector/pgvector:pg15
    profiles: ["honcho"]
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_DB: honcho
      POSTGRES_USER: honcho
      POSTGRES_PASSWORD: ${KINWARD_HONCHO_POSTGRES_PASSWORD:?Run scripts/kinward-setup.sh to generate this}
    volumes:
      - kinward-honcho-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honcho -d honcho"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  honcho-redis:
    image: redis:7-alpine
    profiles: ["honcho"]
    volumes:
      - kinward-honcho-redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  honcho-api:
    build:
      context: ./vendor/honcho
    profiles: ["honcho"]
    depends_on:
      honcho-db:
        condition: service_healthy
      honcho-redis:
        condition: service_healthy
    environment:
      <<: *honcho-env
    ports:
      - "${KINWARD_HONCHO_PORT:-8001}:8000"
    healthcheck:
      test:
        - CMD
        - /app/.venv/bin/python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  honcho-deriver:
    build:
      context: ./vendor/honcho
    profiles: ["honcho"]
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    depends_on:
      honcho-api:
        condition: service_healthy
    environment:
      <<: *honcho-env
    restart: unless-stopped

volumes:
  kinward-honcho-db:
  kinward-honcho-redis:
