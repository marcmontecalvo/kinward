# Optional LLM-Wiki (curated household knowledge) peer.
#
# Absent from the default `docker compose up` inventory. Enabled explicitly with
# `--profile llm-wiki`, normally via `scripts/kinward-setup.sh` rather than by hand.
# Uses marcmontecalvo/llm_wiki's own published image (ghcr.io/marcmontecalvo/llm_wiki)
# - no local build, no vendored source checkout. Override KINWARD_LLM_WIKI_IMAGE to
# pin a specific tag/digest instead of tracking `latest`.
services:
  llm-wiki:
    image: ${KINWARD_LLM_WIKI_IMAGE:-ghcr.io/marcmontecalvo/llm_wiki:latest}
    profiles: ["llm-wiki"]
    volumes:
      - kinward-llm-wiki-data:/wiki_system
    environment:
      WIKI_ROOT: /wiki_system
      WIKI_CONFIG_DIR: /wiki_system/config
      WIKI_UI_USER: admin
      WIKI_UI_PASSWORD: ${KINWARD_LLM_WIKI_UI_PASSWORD:?Run scripts/kinward-setup.sh to generate this}
      WIKI_WEBUI_ENABLED: "false"
      WIKI_TUI_ENABLED: "false"
      WIKI_HONCHO_PUSH: "false"
    ports:
      - "${KINWARD_LLM_WIKI_PORT:-3050}:3050"
    # Healthcheck is inherited from the llm_wiki image's own HEALTHCHECK directive.
    restart: unless-stopped

volumes:
  kinward-llm-wiki-data:
