x-backend: &backend
  image: kinward-backend:local
  environment: &backend-environment
    KINWARD_ENVIRONMENT: ${KINWARD_ENVIRONMENT:-production}
    KINWARD_DATABASE_URL: ${KINWARD_DATABASE_URL:-sqlite+aiosqlite:////data/kinward.db}
    KINWARD_MODEL_PROVIDER: ${KINWARD_MODEL_PROVIDER:-none}
    KINWARD_MEMORY_BACKEND: ${KINWARD_MEMORY_BACKEND:-none}
    KINWARD_KNOWLEDGE_BACKEND: ${KINWARD_KNOWLEDGE_BACKEND:-none}
    KINWARD_CALENDAR_PROVIDER: ${KINWARD_CALENDAR_PROVIDER:-none}
    KINWARD_HONCHO_URL: ${KINWARD_HONCHO_URL:-}
    KINWARD_LLM_WIKI_URL: ${KINWARD_LLM_WIKI_URL:-}
    KINWARD_HOME_ASSISTANT_URL: ${KINWARD_HOME_ASSISTANT_URL:-}
    KINWARD_HOME_ASSISTANT_TOKEN: ${KINWARD_HOME_ASSISTANT_TOKEN:-}
    KINWARD_SETUP_AUTHORIZATION: ${KINWARD_SETUP_AUTHORIZATION:-}
  volumes:
    - kinward-data:/data

services:
  migrate:
    <<: *backend
    build:
      context: ./services/kinward
    command: ["alembic", "-c", "alembic.ini", "upgrade", "head"]
    restart: "no"

  api:
    <<: *backend
    command: ["uvicorn", "kinward.app:app", "--host", "0.0.0.0", "--port", "8000", "--no-access-log"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "${KINWARD_API_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=2)
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  worker:
    <<: *backend
    command: ["python", "-m", "kinward.worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-m", "kinward.worker", "--check"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.7.2
    profiles: ["ha"]
    volumes:
      - kinward-homeassistant:/config
      - ./custom_components/kinward:/config/custom_components/kinward:ro
    ports:
      - "${KINWARD_HA_PORT:-8123}:8123"
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - >-
          import urllib.request;
          urllib.request.urlopen('http://127.0.0.1:8123/manifest.json', timeout=2)
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:18.4-alpine3.23
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kinward}
      POSTGRES_USER: ${POSTGRES_USER:-kinward}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - kinward-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  kinward-data:
  kinward-postgres:
  kinward-homeassistant:

secrets:
  postgres_password:
    environment: KINWARD_POSTGRES_PASSWORD
